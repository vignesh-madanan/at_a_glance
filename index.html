<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Subway Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1024px;
            height: 640px;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 3px solid #000;
        }

        .time {
            font-size: 32px;
            font-weight: bold;
        }

        .date {
            font-size: 18px;
            margin-top: 5px;
        }

        .weather {
            text-align: right;
        }

        .temperature {
            font-size: 28px;
            font-weight: bold;
        }

        .weather-desc {
            font-size: 16px;
            margin-top: 5px;
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .subway-section {
            flex: 1;
            border: 2px solid #000;
            padding: 15px;
        }

        .station-name {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .line-group {
            margin-bottom: 20px;
        }

        .line-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .line-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 10px;
            font-size: 16px;
        }

        .line-4-5-6 { background-color: #00933c; }
        .line-n-q-r-w { background-color: #fccc0a; color: #000; }
        .line-l { background-color: #a7a9ac; }

        .direction {
            font-size: 16px;
            font-weight: bold;
        }

        .arrivals {
            display: flex;
            gap: 15px;
            margin-left: 40px;
        }

        .arrival-time {
            font-size: 18px;
            padding: 5px 10px;
            border: 1px solid #000;
            background-color: #f5f5f5;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #666;
        }

        .error {
            text-align: center;
            color: #000;
            font-weight: bold;
        }

        .last-updated {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="time-section">
            <div class="time" id="current-time">--:--</div>
            <div class="date" id="current-date">Loading...</div>
        </div>
        <div class="weather">
            <div class="temperature" id="temperature">--°F</div>
            <div class="weather-desc" id="weather-desc">Loading...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="subway-section">
            <div class="station-name">Union Square - 14th St</div>
            
            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-4-5-6">4</div>
                    <div class="direction">Downtown & Brooklyn</div>
                </div>
                <div class="arrivals" id="line-4-downtown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-4-5-6">4</div>
                    <div class="direction">Uptown & Bronx</div>
                </div>
                <div class="arrivals" id="line-4-uptown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-4-5-6">6</div>
                    <div class="direction">Downtown & Brooklyn</div>
                </div>
                <div class="arrivals" id="line-6-downtown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-4-5-6">6</div>
                    <div class="direction">Uptown & Bronx</div>
                </div>
                <div class="arrivals" id="line-6-uptown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-n-q-r-w">N</div>
                    <div class="direction">Downtown & Brooklyn</div>
                </div>
                <div class="arrivals" id="line-n-downtown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-n-q-r-w">Q</div>
                    <div class="direction">Uptown & Manhattan</div>
                </div>
                <div class="arrivals" id="line-q-uptown">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <div class="line-group">
                <div class="line-header">
                    <div class="line-badge line-l">L</div>
                    <div class="direction">Brooklyn</div>
                </div>
                <div class="arrivals" id="line-l-brooklyn">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="last-updated" id="last-updated">Last updated: --</div>

    <script>
        const STATION_ID = 'R20'; // Union Square - 14th St
        const MTA_API_KEY = 'YOUR_MTA_API_KEY'; // Replace with your MTA API key
        const WEATHER_API_KEY = 'YOUR_WEATHER_API_KEY'; // Replace with your weather API key

        function updateTime() {
            const now = new Date();
            const timeOptions = { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            };
            const dateOptions = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', timeOptions);
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', dateOptions);
        }

        async function fetchWeather() {
            try {
                // Using NYC coordinates
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=40.7128&lon=-74.0060&appid=${WEATHER_API_KEY}&units=imperial`);
                const data = await response.json();
                
                document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°F`;
                document.getElementById('weather-desc').textContent = data.weather[0].description;
            } catch (error) {
                console.error('Weather fetch error:', error);
                document.getElementById('temperature').textContent = '--°F';
                document.getElementById('weather-desc').textContent = 'Weather unavailable';
            }
        }

        async function fetchSubwayData() {
            try {
                // Note: This is a simplified example. Real MTA API requires GTFS-RT parsing
                // For demo purposes, we'll show mock data
                showMockSubwayData();
                
                // Uncomment and modify this for real MTA API integration:
                /*
                const response = await fetch(`https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs`, {
                    headers: {
                        'x-api-key': MTA_API_KEY
                    }
                });
                const data = await response.arrayBuffer();
                // Process GTFS-RT data here
                */
                
            } catch (error) {
                console.error('Subway data fetch error:', error);
                showSubwayError();
            }
        }

        function showMockSubwayData() {
            const mockData = {
                'line-4-downtown': ['2 min', '8 min', '15 min'],
                'line-4-uptown': ['4 min', '11 min', '18 min'],
                'line-6-downtown': ['1 min', '6 min', '13 min'],
                'line-6-uptown': ['3 min', '9 min', '16 min'],
                'line-n-downtown': ['5 min', '12 min', '19 min'],
                'line-q-uptown': ['7 min', '14 min', '21 min'],
                'line-l-brooklyn': ['2 min', '10 min', '17 min']
            };

            Object.entries(mockData).forEach(([lineId, times]) => {
                const container = document.getElementById(lineId);
                container.innerHTML = times.map(time => 
                    `<div class="arrival-time">${time}</div>`
                ).join('');
            });
        }

        function showSubwayError() {
            const lineContainers = [
                'line-4-downtown', 'line-4-uptown', 'line-6-downtown', 
                'line-6-uptown', 'line-n-downtown', 'line-q-uptown', 'line-l-brooklyn'
            ];
            
            lineContainers.forEach(id => {
                document.getElementById(id).innerHTML = '<div class="error">Service info unavailable</div>';
            });
        }

        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('last-updated').textContent = 
                `Last updated: ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
        }

        function refreshData() {
            fetchWeather();
            fetchSubwayData();
            updateLastUpdated();
        }

        // Initialize
        updateTime();
        refreshData();

        // Update time every second
        setInterval(updateTime, 1000);

        // Refresh data every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
